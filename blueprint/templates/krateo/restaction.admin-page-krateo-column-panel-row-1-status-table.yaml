apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: admin-page-krateo-column-panel-row-1-status-table
  namespace: {{ .Release.Namespace }}
spec:
  api:
  - name: krateo
    path: "/apis/krateo.io/v1/namespaces/{{ .Values.global.krateoNamespace }}/installations/krateoctl"
    filter: >
      [ .krateo.spec.spec.steps[] | select(.type == "chart") | {chartName: .with.repo, releaseName: (.with.releaseName // ""), chartVersion: .with.version, url: .with.url} ]